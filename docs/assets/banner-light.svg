<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" font-family="'Segoe UI', Inter, system-ui, sans-serif">
  <defs>
    <linearGradient id="titleL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#4338ca"/>
      <stop offset="0.55" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="accentL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
    <radialGradient id="glowL" cx="1" cy="0" r="0.8">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.12"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <pattern id="gridL" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="#0B1221" stroke-opacity="0.05"/>
    </pattern>
  </defs>

  <rect width="1200" height="360" rx="18" fill="#F7F8FB"/>
  <rect width="1200" height="360" rx="18" fill="url(#gridL)"/>
  <rect width="1200" height="360" rx="18" fill="url(#glowL)"/>

  <g transform="translate(60,52)">
    <rect width="46" height="46" rx="12" fill="url(#accentL)"/>
    <path d="M9 33 L20 21 L27 27 L39 12" fill="none" stroke="#ffffff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <text x="120" y="86" font-size="22" font-weight="600" fill="#475569" letter-spacing="3">ALPHAAUDIT</text>

  <text x="60" y="168" font-size="62" font-weight="800" fill="url(#titleL)">Do equity anomalies survive?</text>
  <text x="62" y="205" font-size="21" fill="#64748B">A reproducibility audit of the published equity-anomaly literature &#8212; out-of-sample, and across market regimes.</text>

  <g transform="translate(60,236)">
    <g>
      <rect width="200" height="74" rx="14" fill="#ffffff" stroke="#E2E8F0"/>
      <text x="18" y="40" font-size="30" font-weight="800" fill="#0891B2">120</text>
      <text x="18" y="60" font-size="12.5" fill="#64748B">anomalies audited</text>
    </g>
    <g transform="translate(214,0)">
      <rect width="200" height="74" rx="14" fill="#ffffff" stroke="#E2E8F0"/>
      <text x="18" y="40" font-size="30" font-weight="800" fill="#059669">6 &#183; 5%</text>
      <text x="18" y="60" font-size="12.5" fill="#64748B">survive every hurdle</text>
    </g>
    <g transform="translate(428,0)">
      <rect width="200" height="74" rx="14" fill="#ffffff" stroke="#E2E8F0"/>
      <text x="18" y="40" font-size="30" font-weight="800" fill="#D97706">65%</text>
      <text x="18" y="60" font-size="12.5" fill="#64748B">median Sharpe lost</text>
    </g>
    <g transform="translate(642,0)">
      <rect width="200" height="74" rx="14" fill="#ffffff" stroke="#E2E8F0"/>
      <text x="18" y="40" font-size="30" font-weight="800" fill="#7C3AED">0.01</text>
      <text x="18" y="60" font-size="12.5" fill="#64748B">overfitting prob. (PBO)</text>
    </g>
  </g>

  <g transform="translate(905,232)">
    <rect y="0"  width="230" height="12" rx="6" fill="url(#accentL)" opacity="1"/>
    <rect y="18" width="192" height="12" rx="6" fill="url(#accentL)" opacity="0.82"/>
    <rect y="36" width="120" height="12" rx="6" fill="url(#accentL)" opacity="0.64"/>
    <rect y="54" width="86"  height="12" rx="6" fill="url(#accentL)" opacity="0.46"/>
    <rect y="72" width="38"  height="12" rx="6" fill="url(#accentL)" opacity="0.30"/>
  </g>

  <text x="60" y="338" font-size="13" fill="#94A3B8" letter-spacing="0.4">Deflated Sharpe Ratio  &#8226;  Probability of Backtest Overfitting (CSCV)  &#8226;  Multiple-Testing Correction  &#8226;  Regime Conditioning</text>
</svg>
